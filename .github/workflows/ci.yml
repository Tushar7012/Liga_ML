name: CI

on:
  pull_request:
  push:
    branches: [main, gcloud]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Run training result parser tests
        working-directory: frontend
        run: npm run test:training-result

      - name: Run cloud provider tests
        working-directory: frontend
        run: npm run test:cloud-providers

      - name: Run dataset upload UI tests
        working-directory: frontend
        run: npm run test:dataset-upload-ui

      - name: Run output policy tests
        working-directory: frontend
        run: npm run test:output-policy

      - name: Run training planner panel tests
        working-directory: frontend
        run: npm run test:training-planner-panel

      - name: Run dataset discovery panel tests
        working-directory: frontend
        run: npm run test:dataset-discovery-panel

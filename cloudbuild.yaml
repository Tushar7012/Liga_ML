substitutions:
  _REGION: us-central1
  _SERVICE_NAME: liga-ml-intern
  _ARTIFACT_REPO: liga-ml-containers
  _IMAGE_NAME: liga-ml-intern
  _HF_TOKEN_SECRET: hf-token
  _GITHUB_TOKEN_SECRET: github-token
  _OPENAI_API_KEY_SECRET: openai-api-key
  _ML_INTERN_DEFAULT_MODEL_ID: moonshotai/Kimi-K2.6
  _GCS_BUCKET: liga-ml-training
  _VERTEX_AI_SERVICE_ACCOUNT: ""

steps:
  - id: Ensure Artifact Registry repository
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if ! gcloud artifacts repositories describe "${_ARTIFACT_REPO}" \
          --location="${_REGION}" >/dev/null 2>&1; then
          gcloud artifacts repositories create "${_ARTIFACT_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="Liga ML production containers"
        fi

  - id: Build Docker image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest
      - .

  - id: Push commit image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$COMMIT_SHA

  - id: Push latest image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest

  - id: Deploy to Cloud Run
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        SERVICE_ACCOUNT_ARG=()
        if [ -n "${_VERTEX_AI_SERVICE_ACCOUNT}" ]; then
          SERVICE_ACCOUNT_ARG=(--service-account="${_VERTEX_AI_SERVICE_ACCOUNT}")
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$COMMIT_SHA" \
          --region="${_REGION}" \
          --platform=managed \
          --port=8080 \
          --memory=2Gi \
          --cpu=2 \
          --timeout=3600 \
          --concurrency=20 \
          --allow-unauthenticated \
          "${SERVICE_ACCOUNT_ARG[@]}" \
          --set-env-vars="ML_INTERN_DEFAULT_MODEL_ID=${_ML_INTERN_DEFAULT_MODEL_ID},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=${_REGION},GCS_BUCKET=${_GCS_BUCKET},VERTEX_AI_STAGING_BUCKET=gs://${_GCS_BUCKET}/vertex-staging,VERTEX_AI_OUTPUT_DIR=gs://${_GCS_BUCKET}/vertex-outputs,ML_INTERN_KPIS_DISABLED=1" \
          --set-secrets="HF_TOKEN=${_HF_TOKEN_SECRET}:latest,GITHUB_TOKEN=${_GITHUB_TOKEN_SECRET}:latest,OPENAI_API_KEY=${_OPENAI_API_KEY_SECRET}:latest"

  - id: Output image names
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "Pushed images:"
        echo "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
        echo "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest
